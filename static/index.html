<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Designer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">

        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">CD</span>
                <span class="logo-name">Content Designer</span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Nova conversa
            </button>
        </aside>

        <main class="main">

            <!-- Landing View -->
            <div class="view landing-view" id="landing-view">
                <div class="greeting">
                    <h1>Olá, criativo!</h1>
                    <h2>O que posso <span class="accent">criar para você?</span></h2>
                    <p class="subtitle">Escolha uma sugestão abaixo ou escreva sua própria mensagem para começar com o Content Designer.</p>
                </div>

                <div class="input-wrapper">
                    <div class="file-chip hidden" id="landing-file-chip">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span class="chip-name" id="landing-chip-name"></span>
                        <button class="chip-remove" id="landing-chip-remove" type="button">×</button>
                    </div>
                    <div class="input-box">
                        <button class="attach-btn" id="landing-attach-btn" type="button" title="Anexar arquivo">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <input
                            type="text"
                            id="landing-input"
                            placeholder="Faça uma pergunta ou um pedido..."
                            autocomplete="off"
                        />
                        <button class="send-btn" id="landing-send-btn" aria-label="Enviar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="suggestions-grid" id="suggestions-grid"></div>
            </div>

            <!-- Chat View -->
            <div class="view chat-view hidden" id="chat-view">
                <div class="messages" id="messages"></div>

                <div class="chat-input-wrapper">
                    <div class="file-chip hidden" id="chat-file-chip">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                        <span class="chip-name" id="chat-chip-name"></span>
                        <button class="chip-remove" id="chat-chip-remove" type="button">×</button>
                    </div>
                    <div class="input-box">
                        <button class="attach-btn" id="chat-attach-btn" type="button" title="Anexar arquivo">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                            </svg>
                        </button>
                        <input
                            type="text"
                            id="chat-input"
                            placeholder="Faça uma pergunta ou um pedido..."
                            autocomplete="off"
                        />
                        <button class="send-btn" id="chat-send-btn" aria-label="Enviar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Pressione Enter para enviar · Shift+Enter para nova linha</p>
                </div>
            </div>

        </main>
    </div>

    <!-- Shared hidden file input -->
    <input
        type="file"
        id="file-input"
        accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.txt,.csv,.json,.md"
        hidden
    >

    <script src="/static/app.js"></script>
</body>
</html>
