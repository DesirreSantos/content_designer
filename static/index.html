<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Designer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">

        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="logo">CD</span>
                <span class="logo-name">Content Designer</span>
            </div>
            <button class="new-chat-btn" id="new-chat-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Nova conversa
            </button>
        </aside>

        <main class="main">

            <!-- Landing View -->
            <div class="view landing-view" id="landing-view">
                <div class="greeting">
                    <h1>Olá, criativo!</h1>
                    <h2>O que posso <span class="accent">criar para você?</span></h2>
                    <p class="subtitle">Escolha uma sugestão abaixo ou escreva sua própria mensagem para começar com o Content Designer.</p>
                </div>

                <div class="input-wrapper">
                    <div class="input-box">
                        <input
                            type="text"
                            id="landing-input"
                            placeholder="Faça uma pergunta ou um pedido..."
                            autocomplete="off"
                        />
                        <button class="send-btn" id="landing-send-btn" aria-label="Enviar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="suggestions-grid" id="suggestions-grid"></div>
            </div>

            <!-- Chat View -->
            <div class="view chat-view hidden" id="chat-view">
                <div class="messages" id="messages"></div>

                <div class="chat-input-wrapper">
                    <div class="input-box">
                        <input
                            type="text"
                            id="chat-input"
                            placeholder="Faça uma pergunta ou um pedido..."
                            autocomplete="off"
                        />
                        <button class="send-btn" id="chat-send-btn" aria-label="Enviar">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Pressione Enter para enviar · Shift+Enter para nova linha</p>
                </div>
            </div>

        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
